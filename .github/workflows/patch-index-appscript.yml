name: Patch CEUA index Apps Script

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-index:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index.html safely
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          apps_url = 'https://script.google.com/macros/s/AKfycbzGJglVArqVnjlo58VWp1uU6bIMf_0KpDVGtKXETxe0S3saPgflbHGXLBMbH2krpRUPpA/exec'
          old_url = "const APPS_SCRIPT_URL = 'COLE_SUA_URL_AQUI';"
          new_url = f"const APPS_SCRIPT_URL = '{apps_url}';"
          if old_url in s:
              s = s.replace(old_url, new_url)
          elif new_url not in s:
              raise SystemExit('APPS_SCRIPT_URL não encontrado')
          helper = r'''
// ── Normalização para o Apps Script CEUA/CIUCA ──
function normalizarPayloadCEUA(dados){
  const limpo = v => String(v || '').trim();
  const slug = v => limpo(v).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Za-z0-9_.-]+/g,'_').replace(/^_+|_+$/g,'').slice(0,60);
  const agora = new Date();
  const ano = (limpo(dados.dt_ini).match(/^(20\d{2})/) || [null, String(agora.getFullYear())])[1];
  const idBase = slug(dados.resp_siape || dados.resp_cpf || dados.resp_email || dados.resp_nome || 'sem_identificacao') || 'sem_identificacao';
  const id_protocolo = `CEUA-SUB-${ano}-${idBase}-${agora.getTime()}`;
  const animais = limpo(dados.especies).split(' ; ').map(x => x.trim()).filter(Boolean).map(item => {
    const [esp, idade, peso, sexo, quantidade] = item.split('|');
    return {
      especie_linhagem: limpo(esp), idade: limpo(idade), peso: limpo(peso), sexo: limpo(sexo), quantidade: limpo(quantidade),
      procedencia: limpo(dados.procedencia), local_alojamento: limpo(dados.aloj_local),
      grau_invasividade: dados.gi ? `GI ${limpo(dados.gi)}` : '',
      destino_animais: limpo(dados.f_destino || dados.f_eutanasia || dados.f_abate)
    };
  });
  return {
    id_protocolo, ano_aprovacao: ano,
    titulo: limpo(dados.titulo_pt), titulo_ingles: limpo(dados.titulo_en), finalidade: limpo(dados.finalidade),
    responsavel: limpo(dados.resp_nome), email_responsavel: limpo(dados.resp_email), unidade: limpo(dados.resp_unid) || 'Setor Palotina',
    data_inicio: limpo(dados.dt_ini), data_final_vigente: limpo(dados.dt_fim),
    status_projeto: 'Ativo', relatorio_final_recebido: 'Não', data_recebimento_relatorio_final: '',
    origem: 'Formulario CEUA GitHub Pages', versao_formulario: 'CEUA 2025 v2.0',
    animais_aprovados: animais, formulario_completo: dados
  };
}
'''
          marker = '// ── Enviar ao Google Sheets ──'
          if 'function normalizarPayloadCEUA' not in s:
              if marker not in s:
                  raise SystemExit('Marcador de envio não encontrado')
              s = s.replace(marker, helper + '\n' + marker)
          s = s.replace("headers: { 'Content-Type': 'application/json' },", "headers: { 'Content-Type': 'text/plain;charset=utf-8' },")
          s = s.replace('body: JSON.stringify(dados)', 'body: JSON.stringify(normalizarPayloadCEUA(dados))')
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit patched index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "index.html already patched."
          else
            git commit -m "Connect CEUA protocol form to Apps Script"
            git push
          fi
