function normalizarPayloadCEUA(dados){
  const limpo = v => String(v || '').trim();
  const slug = v => limpo(v).normalize('NFD').replace(/[\\u0300-\\u036f]/g,'').replace(/[^A-Za-z0-9_.-]+/g,'_').replace(/^_+|_+$/g,'').slice(0,60);
  const agora = new Date();
  const ano = (limpo(dados.dt_ini).match(/^(20\\d{2})/) || [null, String(agora.getFullYear())])[1];
  const idBase = slug(dados.resp_siape || dados.resp_cpf || dados.resp_email || dados.resp_nome || 'sem_identificacao') || 'sem_identificacao';
  const id_protocolo = 'CEUA-SUB-' + ano + '-' + idBase + '-' + agora.getTime();

  const animais = limpo(dados.especies).split(' ; ').map(x => x.trim()).filter(Boolean).map(item => {
    const partes = item.split('|');
    return {
      especie_linhagem: limpo(partes[0]),
      idade: limpo(partes[1]),
      peso: limpo(partes[2]),
      sexo: limpo(partes[3]),
      quantidade: limpo(partes[4]),
      procedencia: limpo(dados.procedencia),
      local_alojamento: limpo(dados.aloj_local),
      grau_invasividade: dados.gi ? 'GI ' + limpo(dados.gi) : '',
      destino_animais: limpo(dados.f_destino || dados.f_eutanasia || dados.f_abate)
    };
  });

  return {
    id_protocolo: id_protocolo,
    ano_aprovacao: ano,
    titulo: limpo(dados.titulo_pt),
    titulo_ingles: limpo(dados.titulo_en),
    finalidade: limpo(dados.finalidade),
    responsavel: limpo(dados.resp_nome),
    email_responsavel: limpo(dados.resp_email),
    unidade: limpo(dados.resp_unid) || 'Setor Palotina',
    data_inicio: limpo(dados.dt_ini),
    data_final_vigente: limpo(dados.dt_fim),
    instalacao_ciuca_nome: limpo(dados.instalacao_ciuca_nome || V('inst_ciuca_nome')),
    instalacao_ciuca_confirmada: document.getElementById('inst_ciuca_confirm')?.checked ? 'Sim' : 'Não',
    relatorio_final_ciente: document.getElementById('relatorio_final_ciente')?.checked ? 'Sim' : 'Não',
    status_projeto: 'Ativo',
    relatorio_final_recebido: 'Não',
    data_recebimento_relatorio_final: '',
    origem: 'Formulario CEUA GitHub Pages',
    versao_formulario: 'CEUA 2025 v2.2',
    animais_aprovados: animais,
    formulario_completo: dados
  };
}
`;
