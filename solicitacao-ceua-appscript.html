<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carregando Formulário CEUA...</title>
<style>
body{font-family:Arial,sans-serif;background:#E8F4F6;color:#164549;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:24px}.box{background:white;border:1px solid #D1E9ED;border-radius:16px;padding:28px;max-width:680px;box-shadow:0 8px 24px rgba(42,123,136,.12)}.err{color:#991B1B;background:#FEE2E2;border:1px solid #FCA5A5;padding:12px;border-radius:10px;margin-top:16px;display:none}</style>
</head>
<body>
<div class="box">
  <h1>Carregando formulário CEUA...</h1>
  <p>Esta página usa a versão preservada do formulário e conecta o registro ao Apps Script/planilha da CEUA.</p>
  <div id="erro" class="err"></div>
</div>
<script>
(function(){
  const SOURCE_URL = 'https://raw.githubusercontent.com/MarcoAntonioBarreiros/CEUA_form/backup-index-before-appscript-20260623/index.html';
  const APPS_URL = 'https://script.google.com/macros/s/AKfycbzGJglVArqVnjlo58VWp1uU6bIMf_0KpDVGtKXETxe0S3saPgflbHGXLBMbH2krpRUPpA/exec';
  const EMAIL_CEUA = 'ceua.palotina@gmail.com';

  const helper = `
// ── Normalização/validação institucional CEUA/CIUCA ──
function validarCamposInstitucionais(){
  const inst = V('inst_ciuca_nome');
  const instOk = document.getElementById('inst_ciuca_confirm')?.checked;
  const relOk = document.getElementById('relatorio_final_ciente')?.checked;
  if(!inst){
    go(3);
    showStatus('warn','Informe o nome da instalação animal cadastrada no CIUCA onde a atividade será realizada.');
    setTimeout(()=>document.getElementById('inst_ciuca_nome')?.focus(),350);
    return false;
  }
  if(!instOk){
    go(3);
    showStatus('warn','Marque a declaração de que a instalação indicada está cadastrada e regular no CIUCA.');
    setTimeout(()=>document.getElementById('inst_ciuca_confirm')?.focus(),350);
    return false;
  }
  if(!relOk){
    go(6);
    showStatus('warn','Marque a ciência sobre a obrigação de entregar relatório final ao encerramento da atividade/projeto.');
    setTimeout(()=>document.getElementById('relatorio_final_ciente')?.focus(),350);
    return false;
  }
  return true;
}

function normalizarPayloadCEUA(dados){
  const limpo = v => String(v || '').trim();
  const slug = v => limpo(v).normalize('NFD').replace(/[\\u0300-\\u036f]/g,'').replace(/[^A-Za-z0-9_.-]+/g,'_').replace(/^_+|_+$/g,'').slice(0,60);
  const agora = new Date();
  const ano = (limpo(dados.dt_ini).match(/^(20\\d{2})/) || [null, String(agora.getFullYear())])[1];
  const idBase = slug(dados.resp_siape || dados.resp_cpf || dados.resp_email || dados.resp_nome || 'sem_identificacao') || 'sem_identificacao';
  const id_protocolo = 'CEUA-SUB-' + ano + '-' + idBase + '-' + agora.getTime();

  const animais = limpo(dados.especies).split(' ; ').map(x => x.trim()).filter(Boolean).map(item => {
    const partes = item.split('|');
    return {
      especie_linhagem: limpo(partes[0]),
      idade: limpo(partes[1]),
      peso: limpo(partes[2]),
      sexo: limpo(partes[3]),
      quantidade: limpo(partes[4]),
      procedencia: limpo(dados.procedencia),
      local_alojamento: limpo(dados.aloj_local),
      grau_invasividade: dados.gi ? 'GI ' + limpo(dados.gi) : '',
      destino_animais: limpo(dados.f_destino || dados.f_eutanasia || dados.f_abate)
    };
  });

  return {
    id_protocolo: id_protocolo,
    ano_aprovacao: ano,
    titulo: limpo(dados.titulo_pt),
    titulo_ingles: limpo(dados.titulo_en),
    finalidade: limpo(dados.finalidade),
    responsavel: limpo(dados.resp_nome),
    email_responsavel: limpo(dados.resp_email),
    unidade: limpo(dados.resp_unid) || 'Setor Palotina',
    data_inicio: limpo(dados.dt_ini),
    data_final_vigente: limpo(dados.dt_fim),
    instalacao_ciuca_nome: limpo(dados.instalacao_ciuca_nome || V('inst_ciuca_nome')),
    instalacao_ciuca_confirmada: document.getElementById('inst_ciuca_confirm')?.checked ? 'Sim' : 'Não',
    relatorio_final_ciente: document.getElementById('relatorio_final_ciente')?.checked ? 'Sim' : 'Não',
    status_projeto: 'Ativo',
    relatorio_final_recebido: 'Não',
    data_recebimento_relatorio_final: '',
    origem: 'Formulario CEUA GitHub Pages',
    versao_formulario: 'CEUA 2025 v2.2',
    animais_aprovados: animais,
    formulario_completo: dados
  };
}
`;

  const instalacaoHtml = `
  <!-- Instalação animal cadastrada no CIUCA -->
  <div class="mb-6 p-4 bg-amber-50/70 rounded-xl border border-amber-200">
    <h3 class="font-bold text-amber-800 mb-2 text-sm uppercase tracking-wide">Instalação animal cadastrada no CIUCA</h3>
    <p class="text-[.72rem] text-amber-800 mb-3">Informe a(s) instalação(ões) cadastrada(s) no CIUCA onde ocorrerá a manutenção, alojamento, manejo, procedimento ou uso dos animais nesta solicitação.</p>
    <div><label class="lbl">Nome da(s) instalação(ões) cadastrada(s) no CIUCA <span class="text-red-500">*</span></label><textarea id="inst_ciuca_nome" class="fi" rows="2" placeholder="Ex.: Laboratório de Saúde Suína; Biotério de Roedores; Hospital Veterinário..."></textarea></div>
    <label class="cbc mt-3"><input type="checkbox" id="inst_ciuca_confirm"> <span>Declaro que a(s) instalação(ões) indicada(s) está(ão) cadastrada(s) e regular(es) no CIUCA para a finalidade, espécie/grupo animal e atividades previstas nesta solicitação.</span></label>
  </div>`;

  const relatorioHtml = `
      <label class="cbc mt-3 p-3 bg-amber-50 border border-amber-200 rounded-lg"><input type="checkbox" id="relatorio_final_ciente"> <span><strong>Relatório final:</strong> declaro estar ciente de que, ao encerramento da atividade/projeto, o coordenador da proposta deverá encaminhar à CEUA o relatório final de uso dos animais, informando as espécies utilizadas, o número efetivamente utilizado, eventuais alterações em relação ao aprovado e as respectivas justificativas. Estou ciente de que relatório final pendente poderá impedir a submissão ou tramitação de nova solicitação junto à CEUA até a regularização da pendência.</span></label>`;

  const avisoSubmissaoHtml = `
  <div class="mb-4 p-4 bg-amber-50 border border-amber-200 rounded-xl text-[.78rem] text-amber-900 leading-relaxed">
    <strong>Importante:</strong> ao clicar no botão abaixo, os dados serão registrados na planilha interna da CEUA e será gerado um PDF no seu dispositivo. A solicitação somente será formalmente submetida após o coordenador assinar o PDF e encaminhá-lo para <strong>${EMAIL_CEUA}</strong>.
  </div>`;

  const giAjudaHtml = `
      <details data-ceua-help="gi" class="mt-2 mb-3 p-3 bg-tl-50/40 border border-tl-100 rounded-lg text-[.72rem] text-slate-600 leading-relaxed">
        <summary class="cursor-pointer font-bold text-tl-700">Como classificar o Grau de Invasividade (GI)?</summary>
        <div class="mt-2 space-y-2">
          <p><strong>GI1</strong> — Experimentos que causam pouco ou nenhum desconforto ou estresse. Exemplos: observação e exame físico; administração oral, intravenosa, intraperitoneal, subcutânea ou intramuscular de substâncias que não causem reações adversas perceptíveis; eutanásia por métodos aprovados após anestesia ou sedação; privação alimentar ou hídrica por períodos equivalentes aos que ocorrem na natureza.</p>
          <p><strong>GI2</strong> — Experimentos que causam estresse, desconforto ou dor de leve intensidade. Exemplos: procedimentos cirúrgicos menores, como biópsias, sob anestesia; períodos breves de contenção ou imobilidade em animais conscientes; exposição a níveis não letais de compostos químicos que não causem reações adversas graves.</p>
          <p><strong>GI3</strong> — Experimentos que causam estresse, desconforto ou dor de intensidade intermediária. Exemplos: procedimentos cirúrgicos invasivos conduzidos em animais anestesiados; imobilidade física por várias horas; indução de estresse por separação materna ou exposição a agressor; estímulos aversivos inescapáveis; choques localizados de intensidade leve; exposição a radiação ou compostos químicos que provoquem prejuízo duradouro da função sensorial ou motora; administração por vias como intracardíaca ou intracerebral.</p>
          <p><strong>GI4</strong> — Experimentos que causam dor de alta intensidade. Exemplo: indução de trauma em animais não sedados.</p>
          <p class="text-[.65rem] text-slate-500">Fonte: Resolução Normativa CONCEA/MCTI nº 52, de 19 de maio de 2021.</p>
        </div>
      </details>`;

  const farmacosAjudaHtml = `
    <div data-ceua-help="farmacos" class="mb-3 p-3 bg-tl-50/40 border border-tl-100 rounded-lg text-[.76rem] text-slate-600 leading-relaxed">
      <p>Informe o nome do princípio ativo utilizando a Denominação Comum Brasileira (DCB) ou, quando cabível, a Denominação Comum Internacional (DCI). Não informe apenas o nome comercial.</p>
      <a class="inline-flex mt-2 px-3 py-1.5 rounded-md bg-white border border-tl-200 text-tl-700 font-bold hover:bg-tl-50" href="https://www.gov.br/anvisa/pt-br/assuntos/farmacopeia/dcb" target="_blank" rel="noopener noreferrer">Consultar Denominações Comuns Brasileiras — Anvisa</a>
    </div>`;

  const eutanasiaAjudaHtml = `
      <div data-ceua-help="eutanasia" class="mt-3 p-3 bg-tl-50/40 border border-tl-100 rounded-lg text-[.76rem] text-slate-600 leading-relaxed">
        <p>Consulte a Diretriz da Prática de Eutanásia do CONCEA para verificar os métodos recomendados, aceitos com restrições ou inaceitáveis para a espécie, faixa etária e situação descritas no protocolo. Métodos restritos devem ser tecnicamente justificados no campo correspondente.</p>
        <a class="inline-flex mt-2 px-3 py-1.5 rounded-md bg-white border border-tl-200 text-tl-700 font-bold hover:bg-tl-50" href="https://www.gov.br/mcti/pt-br/composicao/colegiados/concea/arquivos/arquivo/legislacao/anexo-da-resolucao-normativa-no-37-de-15-de-fevereiro-de-2018.pdf" target="_blank" rel="noopener noreferrer">Consultar Diretriz de Eutanásia do CONCEA</a>
      </div>`;

  function replaceHelp(html, anchor, replacement, marker, label){
    if(html.includes(marker)) return html;
    if(!html.includes(anchor)){
      console.error('CEUA: âncora não encontrada para ' + label);
      return html;
    }
    return html.replace(anchor, replacement);
  }

  fetch(SOURCE_URL, {cache:'no-store'})
    .then(r => {
      if(!r.ok) throw new Error('Não foi possível carregar o formulário original: HTTP ' + r.status);
      return r.text();
    })
    .then(html => {
      html = html.replace("const APPS_SCRIPT_URL = 'COLE_SUA_URL_AQUI';", "const APPS_SCRIPT_URL = '" + APPS_URL + "';");

      // Inserções visuais, sem alterar a estrutura principal do formulário original.
      html = html.replace('\n\n  <!-- CIUCA -->', '\n\n' + instalacaoHtml + '\n\n  <!-- CIUCA -->');
      html = html.replace('<p class="ml-3" id="termoItemD" style="display:none"><strong>d)</strong> esta atividade de ensino foi avaliada conforme os critérios da Resolução Normativa CONCEA nº 53, de 19 de maio de 2021, e atende aos requisitos para utilização de animais em atividades didáticas, conforme árvore de decisão do Anexo da referida Resolução.</p>\n    </div>', '<p class="ml-3" id="termoItemD" style="display:none"><strong>d)</strong> esta atividade de ensino foi avaliada conforme os critérios da Resolução Normativa CONCEA nº 53, de 19 de maio de 2021, e atende aos requisitos para utilização de animais em atividades didáticas, conforme árvore de decisão do Anexo da referida Resolução.</p>' + relatorioHtml + '\n    </div>');
      html = html.replace('<!-- ── Painel de Envio ── -->', avisoSubmissaoHtml + '\n\n    <!-- ── Painel de Envio ── -->');
      html = replaceHelp(html, '      </div>\n      <h4 class="font-bold text-sm mb-2 mt-3">8.3 Condições de Alojamento</h4>', '      </div>\n' + giAjudaHtml + '\n      <h4 class="font-bold text-sm mb-2 mt-3">8.3 Condições de Alojamento</h4>', 'data-ceua-help="gi"', 'ajuda de grau de invasividade');
      html = replaceHelp(html, '    <div id="drBox" class="space-y-2"></div>', farmacosAjudaHtml + '\n    <div id="drBox" class="space-y-2"></div>', 'data-ceua-help="farmacos"', 'ajuda de nomenclatura dos fármacos');
      html = replaceHelp(html, '      <input type="text" id="f_met" class="fi" placeholder="Método utilizado">', '      <input type="text" id="f_met" class="fi" placeholder="Método utilizado">\n' + eutanasiaAjudaHtml, 'data-ceua-help="eutanasia"', 'ajuda da diretriz de eutanásia');

      // Simplifica o painel: um único botão registra na planilha e gera o PDF para assinatura.
      html = html.replace('grid grid-cols-1 md:grid-cols-2 gap-3 mb-4', 'grid grid-cols-1 gap-3 mb-4');
      html = html.replace(/\s*<!-- 2\. Apenas PDF local -->[\s\S]*?<\/button>/, '');
      html = html.replace('Enviar ao CEUA + Gerar PDF', 'Registrar dados e gerar PDF para assinatura');
      html = html.replace('Enviando dados ao Google Sheets do CEUA...', 'Registrando dados na planilha interna da CEUA...');
      html = html.replace('Ao clicar "Enviar ao CEUA", os dados do formulário são gravados automaticamente na planilha da coordenação. O PDF é gerado no seu dispositivo.', 'Ao clicar no botão, os dados são registrados na planilha interna da CEUA e o PDF é gerado no seu dispositivo. Assine o PDF e envie para ' + EMAIL_CEUA + '.');
      html = html.replace("showStatus('sending', 'Enviando formulário ao CEUA...');", "showStatus('sending', 'Registrando dados na planilha interna da CEUA...');");
      html = html.replace('Formulário enviado com sucesso!', 'Dados registrados na planilha interna da CEUA!');
      html = html.replace("showToast('✓ Dados enviados ao CEUA + PDF gerado!');", "showToast('✓ Dados registrados e PDF gerado. Assine e envie para " + EMAIL_CEUA + ".');");

      // Dados adicionais no objeto coletado.
      html = html.replace("ciuca:Cs('ci').join(', '), ciuca_outros:V('ci_outros'),", "ciuca:Cs('ci').join(', '), ciuca_outros:V('ci_outros'),\n     instalacao_ciuca_nome:V('inst_ciuca_nome'), instalacao_ciuca_confirmada:(document.getElementById('inst_ciuca_confirm')?.checked?'Sim':'Não'),\n     relatorio_final_ciente:(document.getElementById('relatorio_final_ciente')?.checked?'Sim':'Não'),");

      // Campos também aparecem no PDF gerado.
      html = html.replace("np(); sec('FINALIDADE DO PROJETO — Dados CIUCA');", "np(); sec('INSTALAÇÃO ANIMAL CADASTRADA NO CIUCA');\n  lv('Nome da instalação:',V('inst_ciuca_nome'),42);\n  cbx('Instalação indicada declarada como cadastrada e regular no CIUCA',document.getElementById('inst_ciuca_confirm')?.checked);\n  y+=2;\n  sec('FINALIDADE DO PROJETO — Dados CIUCA');");
      html = html.replace("termoItens.forEach(t=>{ ck(12); const ls=doc.splitTextToSize(t,CW-5); doc.text(ls,ML+3,y); y+=ls.length*3.5+2; });", "termoItens.forEach(t=>{ ck(12); const ls=doc.splitTextToSize(t,CW-5); doc.text(ls,ML+3,y); y+=ls.length*3.5+2; });\n  y+=2; sub('Relatório final de uso dos animais');\n  const relFinal=(document.getElementById('relatorio_final_ciente')?.checked?'[X] ':'[ ] ')+'Declaro estar ciente de que, ao encerramento da atividade/projeto, o coordenador da proposta deverá encaminhar à CEUA o relatório final de uso dos animais, informando espécies utilizadas, número efetivamente utilizado, eventuais alterações em relação ao aprovado e justificativas. Estou ciente de que relatório final pendente poderá impedir nova solicitação até a regularização.';\n  tb(relFinal,5);\n  y+=2; sub('Submissão formal à CEUA');\n  tb('Após assinatura pelo coordenador, encaminhar este PDF assinado para: " + EMAIL_CEUA + ".',2);");

      // Envio ao Apps Script e validações obrigatórias.
      html = html.replace('// ── Enviar ao Google Sheets ──', helper + '\n// ── Enviar ao Google Sheets ──');
      html = html.replace("headers: { 'Content-Type': 'application/json' },", "headers: { 'Content-Type': 'text/plain;charset=utf-8' },");
      html = html.replace('body: JSON.stringify(dados)', 'body: JSON.stringify(normalizarPayloadCEUA(dados))');
      html = html.replace('async function enviarEGerarPDF(){\n  const dados = coletarDados();', 'async function enviarEGerarPDF(){\n  if(!validarCamposInstitucionais()) return;\n  const dados = coletarDados();');

      document.open();
      document.write(html);
      document.close();
    })
    .catch(err => {
      const e = document.getElementById('erro');
      e.style.display = 'block';
      e.textContent = 'Erro ao carregar o formulário: ' + err.message;
    });
})();
</script>
</body>
</html>
